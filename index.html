<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MS Date Picker Plugin Demo</title>
    <link rel="stylesheet" href="src/ms-date-picker.css">
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f2f2f2;
        color: #1f1f1f;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(880px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 600;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0 0 28px;
        color: #575757;
        line-height: 1.55;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .field {
        padding: 18px;
        background: #ffffff;
        border: 1px solid #d7d7d7;
        border-radius: 8px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        color: inherit;
        background: #ffffff;
        border: 1px solid #8f8f8f;
        border-radius: 4px;
        font: inherit;
      }

      input:focus {
        outline: 2px solid #0067c0;
        outline-offset: 1px;
      }

      code {
        display: block;
        margin-top: 10px;
        color: #575757;
        font-size: 13px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #202020;
          color: #f3f3f3;
        }

        p,
        code {
          color: #c8c8c8;
        }

        .field,
        input {
          background: #2b2b2b;
          border-color: #515151;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Date picker plugin</h1>
      <p>Click any input to open a Windows Calculator inspired date picker. The first input uses the default DD-MM-YYYY format.</p>

      <section class="demo-grid" aria-label="Date picker examples">
        <div class="field">
          <label for="default-date">Default format</label>
          <input id="default-date" type="text" placeholder="DD-MM-YYYY">
          <code>format: "DD-MM-YYYY"</code>
        </div>

        <div class="field">
          <label for="us-date">US format</label>
          <input id="us-date" type="text" placeholder="MM/DD/YYYY">
          <code>format: "MM/DD/YYYY"</code>
        </div>

        <div class="field">
          <label for="long-date">Spanish labels</label>
          <input id="long-date" type="text" placeholder="D MMMM YYYY">
          <code>format: "D MMMM YYYY", language: "es"</code>
        </div>

        <div class="field">
          <label for="georgian-date">Georgian dark theme</label>
          <input id="georgian-date" type="text" placeholder="DD-MM-YYYY">
          <code>hide Today, language: "ka", custom animation</code>
        </div>
      </section>
    </main>

    <script src="src/ms-date-picker.js"></script>
    <script src="src/lang/es.js"></script>
    <script src="src/lang/ka.js"></script>
    <script>
      new MSDatePicker(document.querySelector("#default-date"));
      new MSDatePicker(document.querySelector("#us-date"), { format: "MM/DD/YYYY" });
      new MSDatePicker(document.querySelector("#long-date"), { format: "D MMMM YYYY", language: "es", defaultDate: new Date() });
      new MSDatePicker(document.querySelector("#georgian-date"), {
        language: "ka",
        theme: "dark",
        showTodayButton: false,
        animations: {
          viewDuration: 260,
          selectDuration: 220
        },
        scrollNavigation: {
          threshold: 35,
          wheelThrottle: 140
        },
        colors: {
          selectedBackground: "#16a34a",
          selectedText: "#ffffff",
          hover: {
            light: "#d1fae5",
            dark: "#065f46"
          }
        }
      });
    </script>
  </body>
</html>
